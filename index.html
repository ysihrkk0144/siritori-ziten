<head>
<meta charset="UTF-8">

<meta name="theme-color" content="#FF7AC3">
<title>小学生しりとり辞典</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="しりとり辞典">
<style>
  :root{
    --bg:#F2F8FF; --card:#FFFFFF; --ink:#2B2B40; --sub:#7A7A92;
    --g1:#FF7AC3; --g2:#FF9B45; --g3:#FFD24D; /* header gradient */
    --shadow:0 6px 18px rgba(60,80,140,.12);
    --navh:0px; /* JSが実測して入れる */
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{
    margin:0; color:var(--ink); background:var(--bg);
    font-family:"Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN","Yu Gothic","YuGothic",
                "Meiryo","Noto Sans JP",system-ui,sans-serif;
    line-height:1.5; padding-bottom:90px;
  }
  /* ヘッダー（タイトル） */
  header{
    background:linear-gradient(135deg,var(--g1),var(--g2) 55%,var(--g3));
    color:#fff; padding:20px 16px 18px; text-align:center;
    border-radius:0 0 26px 26px; box-shadow:var(--shadow);
  }
  header h1{margin:0; font-size:26px; letter-spacing:1px;
    text-shadow:0 2px 0 rgba(0,0,0,.12)}
  header p{margin:8px 0 0; font-size:13px; opacity:.95}
  /* ナビ（五十音ボタン＋チップ） sticky */
  .nav{position:sticky; top:0; z-index:50; background:rgba(242,248,255,.92);
    backdrop-filter:blur(8px); padding:10px 10px 8px;
    box-shadow:0 4px 10px rgba(60,80,140,.06)}
  .cols{display:grid; grid-template-columns:repeat(10,1fr); gap:6px}
  .col{border:none; border-radius:14px; color:#fff; font-size:20px; font-weight:700;
    padding:8px 0; cursor:pointer; box-shadow:0 3px 0 rgba(0,0,0,.12);
    transition:transform .08s}
  .col:active{transform:translateY(2px); box-shadow:0 1px 0 rgba(0,0,0,.12)}
  .col.on{outline:3px solid #fff; outline-offset:-3px}
  .chips{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; padding:0 2px;
    max-height:0; overflow:hidden; transition:max-height .25s ease}
  .chips.open{max-height:90px}
  .chip{border:2px solid #fff; border-radius:999px; font-size:18px; font-weight:700;
    padding:5px 14px; color:#fff; cursor:pointer; box-shadow:var(--shadow)}
  .chip[disabled]{opacity:.35; filter:grayscale(.4); cursor:default; box-shadow:none}
  /* 本文 */
  main{padding:6px 14px 0; max-width:680px; margin:0 auto}
  .lead{font-size:13px; color:var(--sub); text-align:center; margin:14px 4px 4px}
  .group{margin-top:6px}
  .ghead{display:flex; align-items:center; gap:10px; margin:18px 0 8px;
    scroll-margin-top:var(--navh)}
  .gbadge{width:46px; height:46px; border-radius:50%; color:#fff; font-size:26px;
    font-weight:800; display:flex; align-items:center; justify-content:center;
    box-shadow:var(--shadow)}
  .gline{flex:1; height:3px; border-radius:3px; background:#E3ECF7}
  .card{background:var(--card); border-radius:18px; padding:14px 16px; margin:10px 0;
    box-shadow:var(--shadow); border-left:7px solid #ccc}
  .word{font-size:21px; font-weight:800}
  .yomi{font-size:14px; color:var(--sub); font-weight:600; margin-left:4px}
  .mean{margin-top:6px; font-size:15px}
  /* トップへ戻る */
  #toTop{position:fixed; right:16px; bottom:18px; z-index:60;
    border:none; border-radius:999px; padding:13px 18px; font-size:15px; font-weight:800;
    color:#fff; background:linear-gradient(135deg,var(--g1),var(--g2));
    box-shadow:0 8px 20px rgba(255,120,160,.45); cursor:pointer;
    opacity:0; transform:translateY(20px); pointer-events:none; transition:.25s}
  #toTop.show{opacity:1; transform:none; pointer-events:auto}
  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto} .chips,#toTop,.col{transition:none}}

  /* ── オフラインキャッシュ完了バナー ── */
  #swBanner{
    position:fixed; top:0; left:0; right:0; z-index:200;
    display:flex; align-items:center; justify-content:center; gap:8px;
    padding:12px 16px;
    background:linear-gradient(90deg,#26DE81,#0fbcf9);
    color:#fff; font-size:14px; font-weight:700;
    box-shadow:0 4px 16px rgba(38,222,129,.45);
    transform:translateY(-110%);
    transition:transform .35s cubic-bezier(.34,1.4,.64,1);
    pointer-events:none;
  }
  #swBanner.show{transform:translateY(0); pointer-events:auto;}
  #swBanner button{
    background:rgba(255,255,255,.3); border:none; border-radius:999px;
    color:#fff; font-size:16px; line-height:1; padding:2px 8px; cursor:pointer;
    margin-left:8px;
  }
</style>
</head>

<!-- オフラインキャッシュ完了バナー（Service Workerから通知が来ると表示） -->
<div id="swBanner" role="status" aria-live="polite" aria-atomic="true">
  <span id="swBannerText"></span>
  <button onclick="document.getElementById('swBanner').classList.remove('show')"
          aria-label="閉じる">×</button>
</div>

<header>
  <h1>小学生しりとり辞典</h1>
  <p>言葉をたくさん知って、大人にドヤ顔をしよう！</p>
</header>

<nav class="nav" aria-label="五十音ナビ">
  <div class="cols" id="cols"></div>

</main>

/* ===== 五十音の順番・行わけ ===== */
const ORDER = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをん";
const COLS = [
  ["あ","あいうえお","#FF6B6B"],
  ["か","かきくけこ","#FF924C"],
  ["さ","さしすせそ","#F4B400"],
  ["た","たちつてと","#34B86E"],
  ["な","なにぬねの","#1BB5A8"],
  ["は","はひふへほ","#4D96FF"],
  ["ま","まみむめも","#6C5CE7"],
  ["や","やゆよ","#B983FF"],
  ["ら","らりるれろ","#FF6FB5"],
  ["わ","わをん","#00B894"],
];
/* 濁点・小書きを「もとの音」に直す表（並べ替えと見出しに使う） */
const BASE = {
"が":"か","ぎ":"き","ぐ":"く","げ":"け","ご":"こ","ざ":"さ","じ":"し","ず":"す","ぜ":"せ","ぞ":"そ",
"だ":"た","ぢ":"ち","づ":"つ","で":"て","ど":"と","ば":"は","び":"ひ","ぶ":"ふ","べ":"へ","ぼ":"ほ",
"ぱ":"は","ぴ":"ひ","ぷ":"ふ","ぺ":"へ","ぽ":"ほ",
"ぁ":"あ","ぃ":"い","ぅ":"う","ぇ":"え","ぉ":"お","っ":"つ","ゃ":"や","ゅ":"ゆ","ょ":"よ","ゎ":"わ"
};
const base = c => BASE[c] || c;
const gi = c => { const i = ORDER.indexOf(base(c)); return i<0 ? 999 : i; };

/* 五十音順にくらべる（同じ音なら清音→濁音の順） */
function cmp(a,b){
  const n = Math.min(a.length,b.length);
  for(let i=0;i<n;i++){
    const d = gi(a[i]) - gi(b[i]);
    if(d) return d;
    if(a[i]!==b[i]) return a.charCodeAt(i)-b.charCodeAt(i);
  }
  return a.length-b.length;
}

/* データを整える：並べ替え→行（base）でグループ化 */
const words = RAW.map(([w,y,m])=>({w,y,m})).sort((p,q)=>cmp(p.y,q.y));
const groups = {};          // 見出し音 -> 単語配列
for(const it of words){
  const key = base(it.y[0]);
  (groups[key] ||= []).push(it);
}
/* 音 -> 行の色 */
const colorOf = {};
for(const [,sounds,color] of COLS) for(const s of sounds) colorOf[s]=color;

/* ===== 画面を作る ===== */
const listEl = document.getElementById("list");
let html = "";
for(const ch of ORDER){
  const arr = groups[ch];
  if(!arr) continue;
  const color = colorOf[ch] || "#888";
  html += `<section class="group">
    <div class="ghead" id="g-${ch}">
      <span class="gbadge" style="background:${color}">${ch}</span>
      <span class="gline"></span>
    </div>`;
  for(const it of arr){
    html += `<article class="card" style="border-left-color:${color}">
      <div><span class="word">${it.w}</span><span class="yomi">（${it.y}）</span></div>
      <div class="mean">${it.m}</div>
    </article>`;
  }
  html += `</section>`;
}
listEl.innerHTML = html;

/* 上の行ボタン */
const colsEl = document.getElementById("cols");
const chipsEl = document.getElementById("chips");
let openCol = -1;
COLS.forEach(([head,sounds,color],idx)=>{
  const b = document.createElement("button");
  b.className="col"; b.textContent=head; b.style.background=color;
  b.onclick=()=>toggleCol(idx);
  colsEl.appendChild(b);
});
function toggleCol(idx){
  [...colsEl.children].forEach((b,i)=>b.classList.toggle("on", i===idx && openCol!==idx));
  if(openCol===idx){ chipsEl.classList.remove("open"); openCol=-1; setNavH(); return; }
  openCol=idx;
  const [,sounds,color]=COLS[idx];
  chipsEl.innerHTML="";
  for(const s of sounds){
    const c=document.createElement("button");
    c.className="chip"; c.textContent=s; c.style.background=color;
    if(groups[s]) c.onclick=()=>jumpTo(s);
    else c.disabled=true;
    chipsEl.appendChild(c);
  }
  chipsEl.classList.add("open");
  setNavH();
}
/* ナビの高さを実測して、ジャンプ位置をずらす（見出しがナビに隠れないように） */
const navEl=document.querySelector(".nav");
function setNavH(){
  document.documentElement.style.setProperty("--navh",(navEl.offsetHeight+10)+"px");
}
function jumpTo(ch){
  const t=document.getElementById("g-"+ch);
  if(!t) return;
  const y=t.getBoundingClientRect().top + window.pageYOffset - navEl.offsetHeight - 10;
  window.scrollTo({top:y, behavior:"smooth"});
}

/* トップへ戻る */
const toTop=document.getElementById("toTop");
toTop.onclick=()=>window.scrollTo({top:0,behavior:"smooth"});
addEventListener("scroll",()=>toTop.classList.toggle("show", scrollY>400),{passive:true});
addEventListener("resize",setNavH);
setNavH();

/* ── PWA: Service Worker 登録 ── */
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {

  /* バナー表示ユーティリティ */
  const banner     = document.getElementById("swBanner");
  const bannerText = document.getElementById("swBannerText");
  let   bannerTimer;

  function showBanner(msg, autoHide = true) {
    bannerText.textContent = msg;
    banner.classList.add("show");
    clearTimeout(bannerTimer);
    if (autoHide) {
      bannerTimer = setTimeout(() => banner.classList.remove("show"), 4000);
    }
  }

  /* Service Worker からのメッセージ受信                          */
  /* activate 完了後に CACHE_READY が届いたらバナーを表示         */
  navigator.serviceWorker.addEventListener("message", e => {
    if (e.data?.type === "CACHE_READY") {
      showBanner("✅ オフライン対応完了！機内モードでも使えます");
    }
  });

  /* SW を登録する */
  window.addEventListener("load", () => {
    navigator.serviceWorker
      .register("service-worker.js")
      .then(reg => {
        console.log("[App] SW 登録成功:", reg.scope);
      })
      .catch(err => {
        /* 登録失敗はサイレントに処理（ユーザー体験を損なわない） */
        console.warn("[App] SW 登録失敗:", err);
      });
  });
}
